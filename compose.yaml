name: n4wtt

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PharmacyDatabase: "Server=sqlserver;Database=N4WTT_Pharmacy;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      AI__Gemini__Enabled: "${AI_GEMINI_ENABLED:-false}"
      AI__Gemini__ApiKey: "${GEMINI_API_KEY:-}"
      AI__Gemini__Model: "${AI_GEMINI_MODEL:-gemini-2.5-flash-lite}"
      Authentication__EncodedAccounts: "${AUTHENTICATION_ENCODED_ACCOUNTS:-W3siRW1haWwiOiJjaS1hdXRoLWRpc2FibGVkQGV4YW1wbGUudGVzdCIsIkRpc3BsYXlOYW1lIjoiQ0kgZGlzYWJsZWQgYWNjb3VudCIsIlJvbGUiOiJBZG1pbiIsIlBhc3N3b3JkU2FsdCI6IkFBQUFBQUFBQUFBQUFBQUFBQUFBQUE9PSIsIlBhc3N3b3JkSGFzaCI6IkFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE9IiwiSXNMb2NrZWQiOnRydWV9XQ==}"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
