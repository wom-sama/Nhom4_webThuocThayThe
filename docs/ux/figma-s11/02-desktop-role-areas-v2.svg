    <text x="932" y="1080" fill="#405364" font-size="15">Bằng chứng, cảnh báo và quyết định được audit.</text>
    <rect x="932" y="1120" width="218" height="98" rx="6" fill="#FFF8E8" stroke="#EBC773"/><text x="956" y="1152" fill="#A35C00" font-size="14" font-weight="700">CHỜ DUYỆT</text><text x="956" y="1190" fill="#0B1F33" font-size="27" font-weight="700">4</text>
    <rect x="1166" y="1120" width="218" height="98" rx="6" fill="#EAF7F0" stroke="#8CC9A6"/><text x="1190" y="1152" fill="#1D7042" font-size="14" font-weight="700">ĐÃ XÁC NHẬN</text><text x="1190" y="1190" fill="#0B1F33" font-size="27" font-weight="700">12</text>
    <rect x="1400" y="1120" width="268" height="98" rx="6" fill="#FFF4F4" stroke="#ECA7A7"/><text x="1424" y="1152" fill="#B42318" font-size="14" font-weight="700">CẢNH BÁO CAO</text><text x="1424" y="1190" fill="#0B1F33" font-size="27" font-weight="700">1</text>
    <text x="932" y="1270" fill="#0B1F33" font-size="19" font-weight="700">Cần xử lý hôm nay</text>
    <rect x="932" y="1298" width="736" height="160" rx="6" fill="#FFFFFF" stroke="#DCE3EA"/>
    <text x="956" y="1334" fill="#0B1F33" font-size="17" font-weight="700">Paracetamol 500mg → DHG 500mg</text><text x="956" y="1368" fill="#405364" font-size="14">Điểm 92 · Cùng hoạt chất · Còn 120 · Không cảnh báo hồ sơ</text>
    <rect x="956" y="1394" width="196" height="42" rx="5" fill="#C77B00"/><text x="1001" y="1421" fill="#FFFFFF" font-size="14" font-weight="700">Mở thẩm định</text><rect x="1168" y="1394" width="180" height="42" rx="5" fill="#FFFFFF" stroke="#9BAAB8"/><text x="1206" y="1421" fill="#263746" font-size="14">Xem bằng chứng</text>
    <text x="932" y="1514" fill="#0B1F33" font-size="19" font-weight="700">Lịch sử quyết định</text>
    <rect x="932" y="1542" width="736" height="118" rx="6" fill="#F8FAFC" stroke="#DCE3EA"/><text x="956" y="1578" fill="#263746" font-size="15">22/06 · Xác nhận đề xuất · EXP-012</text><text x="956" y="1608" fill="#405364" font-size="14">Có ghi chú chuyên môn · Có audit actor/time</text><text x="956" y="1638" fill="#1769AA" font-size="14">Mở lịch sử đầy đủ →</text>
