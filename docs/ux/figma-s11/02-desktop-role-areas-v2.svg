    <rect x="1772" y="1294" width="350" height="116" rx="6" fill="#EAF7F0" stroke="#8CC9A6"/><text x="1796" y="1330" fill="#1D7042" font-size="16" font-weight="700">↻ Trạng thái nguồn</text><text x="1796" y="1362" fill="#263746" font-size="14">3 nguồn · 3 kết nối</text><text x="1796" y="1387" fill="#1D7042" font-size="14">Kiểm tra →</text>
