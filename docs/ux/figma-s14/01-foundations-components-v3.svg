  <text x="84" y="88" fill="#9FE4D8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">N4WTT · S14 · UI V3</text>
  <text x="84" y="130" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Professional Bootstrap Foundations &amp; Components</text>
  <text x="1840" y="112" fill="#D7E4E8" font-family="Inter, Arial, sans-serif" font-size="15">N4WTT-256 · 23/06/2026</text>

  <g font-family="Inter, Arial, sans-serif">
    <text x="84" y="214" fill="#102A33" font-size="25" font-weight="700">01 · Product principles</text>
    <g font-size="16">
      <rect x="84" y="242" width="475" height="112" rx="8" fill="#E7F7F3" stroke="#7CCBBA"/>
      <text x="110" y="280" fill="#0F766E" font-weight="700">TASK FIRST</text><text x="110" y="311" fill="#344A53">Search and decisions stay above explanation.</text><text x="110" y="337" fill="#344A53">One strong CTA per workflow.</text>
      <rect x="575" y="242" width="475" height="112" rx="8" fill="#EAF4FF" stroke="#8EC2F5"/>
      <text x="601" y="280" fill="#1769AA" font-weight="700">SCAN FAST</text><text x="601" y="311" fill="#344A53">Status, stock, score and safety align in rows.</text><text x="601" y="337" fill="#344A53">Details disclose progressively.</text>
      <rect x="1066" y="242" width="475" height="112" rx="8" fill="#FFF7E5" stroke="#E9C66F"/>
      <text x="1092" y="280" fill="#A15C00" font-weight="700">SAFE BY DEFAULT</text><text x="1092" y="311" fill="#344A53">AI remains optional and visibly secondary.</text><text x="1092" y="337" fill="#344A53">Warnings never collapse away.</text>
      <rect x="1557" y="242" width="519" height="112" rx="8" fill="#F4F6F8" stroke="#C5D0D5"/>
      <text x="1583" y="280" fill="#344A53" font-weight="700">DENSE, NOT CROWDED</text><text x="1583" y="311" fill="#344A53">8px radius, 12-column grid, 44px controls.</text><text x="1583" y="337" fill="#344A53">No nested card stacks or decorative gradients.</text>
    </g>

    <text x="84" y="414" fill="#102A33" font-size="25" font-weight="700">02 · Semantic color tokens</text>
    <g font-size="15">
      <rect x="84" y="442" width="232" height="92" rx="8" fill="#102A33"/><text x="106" y="478" fill="#FFFFFF" font-weight="700">INK / NAV</text><text x="106" y="508" fill="#D7E4E8">#102A33</text>
      <rect x="330" y="442" width="232" height="92" rx="8" fill="#0F766E"/><text x="352" y="478" fill="#FFFFFF" font-weight="700">PRIMARY</text><text x="352" y="508" fill="#D7FAF3">#0F766E</text>
      <rect x="576" y="442" width="232" height="92" rx="8" fill="#1769AA"/><text x="598" y="478" fill="#FFFFFF" font-weight="700">INFO</text><text x="598" y="508" fill="#EAF4FF">#1769AA</text>
      <rect x="822" y="442" width="232" height="92" rx="8" fill="#1D7A46"/><text x="844" y="478" fill="#FFFFFF" font-weight="700">AVAILABLE</text><text x="844" y="508" fill="#EAF7EF">#1D7A46</text>
      <rect x="1068" y="442" width="232" height="92" rx="8" fill="#A15C00"/><text x="1090" y="478" fill="#FFFFFF" font-weight="700">CAUTION</text><text x="1090" y="508" fill="#FFF7E5">#A15C00</text>
      <rect x="1314" y="442" width="232" height="92" rx="8" fill="#B42318"/><text x="1336" y="478" fill="#FFFFFF" font-weight="700">CRITICAL</text><text x="1336" y="508" fill="#FDECEC">#B42318</text>
      <rect x="1560" y="442" width="232" height="92" rx="8" fill="#EEF3F5" stroke="#CBD7DC"/><text x="1582" y="478" fill="#344A53" font-weight="700">CANVAS</text><text x="1582" y="508" fill="#5C7078">#EEF3F5</text>
      <rect x="1806" y="442" width="270" height="92" rx="8" fill="#FFFFFF" stroke="#CBD7DC"/><text x="1828" y="478" fill="#344A53" font-weight="700">SURFACE</text><text x="1828" y="508" fill="#5C7078">#FFFFFF · border #CBD7DC</text>
    </g>

    <text x="84" y="594" fill="#102A33" font-size="25" font-weight="700">03 · Type, spacing and elevation</text>
